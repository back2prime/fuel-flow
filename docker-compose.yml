services:
  app:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  db:
    image: postgres:16
    env_file:
      - backend/.env
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"


  celery-worker:
    build: ./backend
    env_file:
      - backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app/
    command: "celery -A core.helpers.celery_helper.celery_helper worker --loglevel=info"

  celery-beat:
    build: ./backend
    env_file:
      - backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app/
    command: "celery -A core.helpers.celery_helper.celery_helper beat --loglevel=info"
