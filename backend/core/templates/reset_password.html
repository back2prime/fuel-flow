<!DOCTYPE html>
<html>
  <body style="font-family: Arial, sans-serif; background-color: #f9f9f9; padding: 40px;">
    <div style="max-width: 480px; margin: 0 auto; background: white; border-radius: 16px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
      <h1 style="color: #FF385C; font-size: 24px; margin-bottom: 8px;">⛽ fuel-flow</h1>
      <h2 style="color: #111; font-size: 20px; margin-bottom: 16px;">Reset your password</h2>
      <p style="color: #555; font-size: 15px; line-height: 1.6;">
        We received a request to reset your password. Click the button below to choose a new one.
        The link will expire in <strong>15 minutes</strong>.
      </p>
      <a href="{url}" style="display: inline-block; margin: 24px 0; background-color: #FF385C; color: white; text-decoration: none; padding: 14px 32px; border-radius: 12px; font-size: 15px; font-weight: bold;">
        Reset password
      </a>
      <p style="color: #999; font-size: 13px;">
        If you didn't request a password reset, you can ignore this email.
      </p>
    </div>
  </body>
</html>
